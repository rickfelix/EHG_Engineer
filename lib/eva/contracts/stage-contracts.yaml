# Stage Contracts — YAML Format
# Typed consume/produce specifications per stage
# Part of SD-MAN-ORCH-EVA-CODEBASE-PLUS-001-K
#
# Each stage declares:
#   consumes: upstream artifacts it requires (stage + fields)
#   produces: artifacts it generates for downstream stages
#
# Field types: string, integer, number, object, array, boolean
# Constraints: required, minLength, min, max, minItems

stages:
  1:
    name: "Venture Intake"
    consumes: []
    produces:
      description: { type: string, minLength: 50 }
      problemStatement: { type: string, minLength: 20 }
      valueProp: { type: string, minLength: 20 }
      targetMarket: { type: string, minLength: 10 }
      archetype: { type: string }

  2:
    name: "AI Scoring"
    consumes:
      - stage: 1
        fields:
          description: { type: string }
          problemStatement: { type: string }
          valueProp: { type: string }
          targetMarket: { type: string }
          archetype: { type: string }
          keyAssumptions: { type: array, required: false }
    produces:
      compositeScore: { type: integer, min: 0, max: 100 }

  3:
    name: "Viability Kill Gate"
    consumes:
      - stage: 1
        fields:
          archetype: { type: string }
          problemStatement: { type: string }
          keyAssumptions: { type: array, required: false }
      - stage: 2
        fields:
          compositeScore: { type: integer }
    produces:
      overallScore: { type: integer, min: 0, max: 100 }
      decision: { type: string }

  4:
    name: "Competitive Intelligence"
    consumes:
      - stage: 1
        fields:
          description: { type: string }
          valueProp: { type: string }
          targetMarket: { type: string }
      - stage: 3
        fields:
          competitorEntities: { type: array, required: false }
    produces:
      competitors: { type: array, minItems: 1 }

  5:
    name: "Unit Economics Kill Gate"
    consumes:
      - stage: 1
        fields:
          archetype: { type: string }
          targetMarket: { type: string }
      - stage: 3
        fields:
          overallScore: { type: integer, required: false }
          decision: { type: string, required: false }
      - stage: 4
        fields:
          competitors: { type: array, required: false }
    produces:
      unitEconomics: { type: object }
      decision: { type: string }
      roiBands: { type: object, required: false }

  6:
    name: "Risk Assessment"
    consumes:
      - stage: 1
        fields:
          description: { type: string }
          targetMarket: { type: string }
      - stage: 3
        fields:
          overallScore: { type: integer, required: false }
      - stage: 4
        fields:
          competitors: { type: array, required: false }
      - stage: 5
        fields:
          unitEconomics: { type: object }
    produces:
      risks: { type: array, minItems: 1 }
      aggregate_risk_score: { type: number }
      normalized_risk_score: { type: number }

  7:
    name: "Pricing Strategy"
    consumes:
      - stage: 1
        fields:
          description: { type: string }
          targetMarket: { type: string }
      - stage: 4
        fields:
          competitors: { type: array, required: false }
      - stage: 5
        fields:
          unitEconomics: { type: object }
      - stage: 6
        fields:
          risks: { type: array }
    produces:
      pricing_model: { type: string }
      tiers: { type: array, minItems: 1 }

  8:
    name: "Business Model Canvas"
    consumes:
      - stage: 1
        fields:
          description: { type: string }
          valueProp: { type: string }
      - stage: 4
        fields:
          competitors: { type: array, required: false }
      - stage: 5
        fields:
          unitEconomics: { type: object }
      - stage: 6
        fields:
          risks: { type: array }
      - stage: 7
        fields:
          pricing_model: { type: string }
          tiers: { type: array, minItems: 1 }
    produces:
      customerSegments: { type: object }
      valuePropositions: { type: object }
      revenueStreams: { type: object }

  9:
    name: "Exit Strategy"
    consumes:
      - stage: 1
        fields:
          description: { type: string }
      - stage: 5
        fields:
          unitEconomics: { type: object }
      - stage: 6
        fields:
          risks: { type: array }
          aggregate_risk_score: { type: number }
      - stage: 7
        fields:
          tiers: { type: array, minItems: 1 }
      - stage: 8
        fields:
          customerSegments: { type: object }
    produces:
      exit_thesis: { type: string, minLength: 20 }
      exit_paths: { type: array, minItems: 1 }
      reality_gate: { type: object }
      valuationEstimate: { type: object, required: false }

  10:
    name: "Customer & Brand Foundation"
    consumes:
      - stage: 1
        fields:
          description: { type: string }
          valueProp: { type: string }
          targetMarket: { type: string }
          problemStatement: { type: string }
      - stage: 3
        fields:
          overallScore: { type: integer, required: false }
      - stage: 5
        fields:
          unitEconomics: { type: object, required: false }
      - stage: 8
        fields:
          customerSegments: { type: object, required: false }
    produces:
      customerPersonas: { type: array, minItems: 3 }
      brandGenome: { type: object }
      candidates: { type: array, minItems: 5 }

  11:
    name: "Naming & Visual Identity"
    consumes:
      - stage: 1
        fields:
          description: { type: string }
          targetMarket: { type: string }
      - stage: 5
        fields:
          unitEconomics: { type: object, required: false }
      - stage: 10
        fields:
          customerPersonas: { type: array, minItems: 3 }
          brandGenome: { type: object }
    produces:
      candidates: { type: array, minItems: 5 }
      visualIdentity: { type: object }
      scoringCriteria: { type: array, minItems: 1 }

  12:
    name: "GTM & Sales Strategy"
    consumes:
      - stage: 1
        fields:
          description: { type: string }
          targetMarket: { type: string }
      - stage: 5
        fields:
          unitEconomics: { type: object, required: false }
      - stage: 7
        fields:
          pricing_model: { type: string, required: false }
          arpa: { type: number, required: false }
      - stage: 10
        fields:
          customerPersonas: { type: array, minItems: 3 }
          brandGenome: { type: object }
      - stage: 11
        fields:
          candidates: { type: array, minItems: 5 }
          decision: { type: object, required: false }
    produces:
      marketTiers: { type: array, minItems: 3 }
      channels: { type: array, minItems: 8 }
      salesModel: { type: string }
      deal_stages: { type: array, minItems: 3 }
      funnel_stages: { type: array, minItems: 4 }
      customer_journey: { type: array, minItems: 5 }
      reality_gate: { type: object }

  13:
    name: "Product Roadmap"
    consumes:
      - stage: 1
        fields:
          description: { type: string }
          valueProp: { type: string }
      - stage: 5
        fields:
          unitEconomics: { type: object, required: false }
      - stage: 8
        fields:
          customerSegments: { type: object, required: false }
      - stage: 9
        fields:
          exit_thesis: { type: string, required: false }
    produces:
      vision_statement: { type: string, minLength: 20 }
      milestones: { type: array, minItems: 3 }
      decision: { type: string }

  14:
    name: "Technical Architecture"
    consumes:
      - stage: 1
        fields:
          description: { type: string }
      - stage: 13
        fields:
          milestones: { type: array }
    produces:
      architecture_summary: { type: string, minLength: 20 }
      layers: { type: object }
      dataEntities: { type: array, minItems: 1 }

  15:
    name: "Risk Matrix"
    consumes:
      - stage: 1
        fields:
          description: { type: string }
      - stage: 6
        fields:
          risks: { type: array, required: false }
      - stage: 13
        fields:
          milestones: { type: array }
      - stage: 14
        fields:
          layers: { type: object }
    produces:
      risks: { type: array, minItems: 1 }
      total_risks: { type: number }

  16:
    name: "Financial Projections"
    consumes:
      - stage: 1
        fields:
          description: { type: string }
      - stage: 13
        fields:
          milestones: { type: array, minItems: 3 }
          decision: { type: string }
      - stage: 14
        fields:
          layers: { type: object }
      - stage: 15
        fields:
          risks: { type: array, minItems: 1 }
    produces:
      runway_months: { type: number }
      promotion_gate: { type: object }

  17:
    name: "Launch Readiness"
    consumes:
      - stage: 13
        fields:
          milestones: { type: array }
      - stage: 14
        fields:
          layers: { type: object }
      - stage: 15
        fields:
          risks: { type: array }
      - stage: 16
        fields:
          runway_months: { type: number }
    produces:
      checklist: { type: object }
      readiness_pct: { type: number }
      buildReadiness: { type: object }

  18:
    name: "Sprint Planning"
    consumes:
      - stage: 13
        fields:
          milestones: { type: array }
      - stage: 14
        fields:
          layers: { type: object }
      - stage: 17
        fields:
          checklist: { type: object }
    produces:
      sprint_name: { type: string }
      items: { type: array, minItems: 1 }
      total_story_points: { type: number }

  19:
    name: "Development Execution"
    consumes:
      - stage: 17
        fields:
          buildReadiness: { type: object, required: false }
      - stage: 18
        fields:
          items: { type: array, minItems: 1 }
    produces:
      tasks: { type: array, minItems: 1 }

  20:
    name: "QA & Testing"
    consumes:
      - stage: 18
        fields:
          items: { type: array }
      - stage: 19
        fields:
          tasks: { type: array }
    produces:
      test_suites: { type: array, minItems: 1 }
      quality_gate_passed: { type: boolean }

  21:
    name: "Build Review"
    consumes:
      - stage: 19
        fields:
          tasks: { type: array }
      - stage: 20
        fields:
          test_suites: { type: array }
    produces:
      integrations: { type: array }
      environment: { type: object }
      reviewDecision: { type: object }

  22:
    name: "Go-Live"
    consumes:
      - stage: 17
        fields:
          readiness_pct: { type: number }
      - stage: 18
        fields:
          items: { type: array }
      - stage: 19
        fields:
          tasks: { type: array }
      - stage: 20
        fields:
          test_suites: { type: array }
          quality_gate_passed: { type: boolean, required: false }
      - stage: 21
        fields:
          integrations: { type: array }
          reviewDecision: { type: object, required: false }
    produces:
      launch_date: { type: string }
      launch_status: { type: string }

  23:
    name: "Post-Launch Ops"
    consumes:
      - stage: 1
        fields:
          description: { type: string }
      - stage: 22
        fields:
          launch_status: { type: string }
    produces:
      incident_response_plan: { type: string }
      rollback_triggers: { type: array }

  24:
    name: "Growth Operations"
    consumes:
      - stage: 5
        fields:
          unitEconomics: { type: object }
      - stage: 23
        fields:
          incident_response_plan: { type: string, required: false }
    produces:
      growth_metrics: { type: object }
      optimization_plan: { type: string }

  25:
    name: "Portfolio Review"
    consumes:
      - stage: 1
        fields:
          description: { type: string }
      - stage: 5
        fields:
          unitEconomics: { type: object }
      - stage: 13
        fields:
          milestones: { type: array }
      - stage: 16
        fields:
          runway_months: { type: number }
      - stage: 23
        fields:
          incident_response_plan: { type: string, required: false }
      - stage: 24
        fields:
          growth_metrics: { type: object }
    produces:
      venture_decision: { type: string }
      portfolio_score: { type: number }
