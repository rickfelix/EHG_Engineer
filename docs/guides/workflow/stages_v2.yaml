# Advisory Checkpoint Configuration
# NOTE: Stage numbers below reference the IMPLEMENTED stage positions.
# Stage 16 in the design spec was "Schema Firewall" (Spec-Driven Schema Generation).
# In the implementation, stage 16 is "Financial Projections" (Phase 4→5 Promotion Gate).
advisory_checkpoints:
  - stage: 3
    name: "Kill Gate (Market Validation)"
    implementation_title: "Kill Gate"
    description: "Kill/Revise/Proceed decision based on market validation score"
    trigger: "validation_score < 6"
  - stage: 5
    name: "Kill Gate (Financial)"
    implementation_title: "Kill Gate (Financial)"
    description: "Financial viability assessment against archetype benchmarks"
    trigger: "gross_margin < threshold OR breakeven_months > threshold"
  - stage: 13
    name: "Product Roadmap Kill Gate"
    implementation_title: "Product Roadmap"
    description: "Kill gate enforces roadmap completeness before Blueprint phase"
    trigger: "milestones < 3 OR missing deliverables OR no 'now' priority milestone"
  - stage: 16
    name: "Financial Projections Promotion Gate"
    implementation_title: "Financial Projections"
    description: "Phase 4→5 Promotion Gate: positive runway and defined projections required"
    trigger: "runway <= 0 OR projections incomplete"
    note: "Design spec called this 'Schema Firewall' but implementation is Financial Projections gate"
  - stage: 22
    name: "Release Readiness Promotion Gate"
    implementation_title: "Release Readiness"
    description: "Phase 5→6 Promotion Gate: all pre-launch checks must pass"
    trigger: "release_checklist incomplete"
