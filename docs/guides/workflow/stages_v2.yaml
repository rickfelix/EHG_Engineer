# Venture Vision v2.0 - 25-Stage Lifecycle Configuration
# SD: SD-VISION-TRANSITION-001D
# Created: 2025-12-06
# Updated: 2025-12-09 (Golden Nuggets Integration)
# Updated: 2026-03-05 (Aligned with codebase implementation)
# Purpose: Definitive configuration for the streamlined 25-stage venture lifecycle
#
# ============================================================================
# IMPLEMENTATION ALIGNMENT NOTE
# ============================================================================
# Stage titles below reflect the ACTUAL codebase implementation.
# Original design-spec titles differed — if you need the design-spec mapping,
# see the git history of this file or docs/guides/workflow/stages_v2_design_spec.yaml.
#
# Phase structure changes from design spec to implementation:
#   - Phase 5 (THE BUILD LOOP): expanded from [17-20] to [17-22]
#   - Phase 6 (THE LAUNCH): condensed from [21-25] to [23-25]
# ============================================================================

version: "2.0"
name: "Venture Vision v2.0"
description: "Streamlined 25-stage venture lifecycle for Solo AI Entrepreneur workflows"

# ============================================================================
# GOLDEN NUGGETS INTEGRATION (Phase 1) - ADR-002 Addendum B
# ============================================================================
# Source: docs/vision/VENTURE_ENGINE_GOLDEN_NUGGETS_PLAN.md
# Evaluated by: Anti-Gravity (4.4/5) & Claude (3.9/5)

golden_nuggets:
  # Priority 1: Assumptions vs Reality (Score: 4.85)
  assumptions_vs_reality:
    enabled: true
    description: "Track versioned assumption sets and compare against actual outcomes"
    stages_create: [2, 3]   # Create Assumption Set V1
    stages_update: [5]      # Update with financial inputs
    stages_reality: [23, 24, 25]  # Collect reality data, generate report

  # Priority 2: Tokens as Investment (Score: 4.35)
  token_budget_profiles:
    enabled: true
    description: "Treat compute/tokens as capital with explicit budget profiles"
    default_profile: "standard"
    profiles:
      exploratory:
        total_tokens: 75000  # 50K-100K midpoint
        use_case: "Quick validation, kill fast"
      standard:
        total_tokens: 375000  # 250K-500K midpoint
        use_case: "Normal venture progression"
        allocation:
          THE_TRUTH: 0.25      # 25% (Stages 1-5)
          THE_ENGINE: 0.15     # 15% (Stages 6-9)
          THE_IDENTITY: 0.10   # 10% (Stages 10-12)
          THE_BLUEPRINT: 0.20  # 20% (Stages 13-16)
          THE_BUILD_LOOP: 0.20 # 20% (Stages 17-20)
          THE_LAUNCH: 0.10     # 10% (Stages 23-25)
      deep_due_diligence:
        total_tokens: 1500000  # 1M-2M midpoint
        use_case: "High-stakes, complex markets"
      custom:
        total_tokens: null  # Chairman override
        use_case: "User-defined"

  # Priority 3: Four Buckets - Hallucination Control (Score: 3.85)
  four_buckets:
    enabled: true
    description: "Classify all outputs as Facts, Assumptions, Simulations, or Unknowns"
    buckets:
      facts: "Statements with traceable sources (DB record, prior artifact, evidence URL)"
      assumptions: "Beliefs about market, users, behavior (must reference assumption_set_id)"
      simulations: "Outputs from venture/feature sims (must reference simulation_run_id)"
      unknowns: "Gaps deliberately not filled (must state resolution requirements)"
    stage_gate_rules:
      - "All Facts must have traceable sources"
      - "All Assumptions must reference current assumption_set_id"
      - "At least one Unknown must be declared (forces honest gaps)"
    epistemic_required_stages: [3, 5, 16]  # Decision gates require classification

  # Chairman Fast-Follow: Crew Tournament Pilot
  crew_tournament_pilot:
    enabled: true
    description: "Tournament-style agent competition for Stage 11 (Brand & Messaging)"
    pilot_stage: 11
    config:
      num_workers: 3
      manager_count: 1
      peer_review: false
      token_ceiling: 50000
      worker_model: "claude-sonnet-4-20250514"
      manager_model: "claude-sonnet-4-20250514"
    scoring_rubric:
      clarity: 0.25
      differentiation: 0.25
      audience_fit: 0.25
      memorability: 0.15
      consistency: 0.10
    success_criteria:
      quality_improvement_target: 0.15  # 15% higher than single-agent baseline
      token_efficiency_max: 3.0         # Max 3x single-agent cost

phases:
  - id: 1
    name: "THE TRUTH"
    description: "Validation and market reality assessment"
    stages: [1, 2, 3, 4, 5]
  - id: 2
    name: "THE ENGINE"
    description: "Business model and strategy foundation"
    stages: [6, 7, 8, 9]
  - id: 3
    name: "THE IDENTITY"
    description: "Brand, positioning, and go-to-market"
    stages: [10, 11, 12]
  - id: 4
    name: "THE BLUEPRINT"
    description: "Technical architecture and specification"
    stages: [13, 14, 15, 16]
  - id: 5
    name: "THE BUILD LOOP"
    description: "Implementation and development cycle"
    stages: [17, 18, 19, 20, 21, 22]
  - id: 6
    name: "THE LAUNCH"
    description: "Launch preparation, execution, and go-live"
    stages: [23, 24, 25]

stages:
  # ============================================================================
  # PHASE 1: THE TRUTH (Stages 1-5)
  # ============================================================================
  - id: 1
    title: "Idea Capture"
    design_spec_title: "Draft Idea & Chairman Review"
    description: "Capture and validate initial venture ideas with AI assistance and Chairman feedback."
    phase_number: 1
    phase_name: "THE TRUTH"
    work_type: artifact_only
    sd_required: false
    advisory_enabled: false
    depends_on: []
    inputs:
      - Voice recording
      - Text input
      - Chairman feedback
    outputs:
      - Structured idea document
      - Initial validation
      - Risk assessment
    artifacts:
      - truth_idea_brief
    metrics:
      - Idea quality score
      - Validation completeness
    gates:
      entry: []
      exit:
        - Title validated (3-120 chars)
        - Description validated (20-2000 chars)
        - Category assigned
        - truth_problem_statement populated  # IDEATION-GENESIS-AUDIT: Lock Chairman vision
        - Chairman intent captured     # IDEATION-GENESIS-AUDIT: Immutable original recorded

  - id: 2
    title: "Idea Analysis"
    design_spec_title: "AI Multi-Model Critique"
    description: "Multi-agent AI system reviews and critiques the idea from multiple perspectives."
    phase_number: 1
    phase_name: "THE TRUTH"
    work_type: automated_check
    sd_required: false
    advisory_enabled: false
    depends_on: [1]
    inputs:
      - Structured idea
      - Historical data
      - Market signals
    outputs:
      - AI critique report
      - Contrarian analysis
      - Risk assessment
    artifacts:
      - truth_ai_critique
    metrics:
      - Review thoroughness
      - Risk identification rate
    gates:
      entry:
        - Idea document complete
      exit:
        - Multi-model pass complete
        - Contrarian review done
        - Top-5 risks identified
    # GOLDEN NUGGET: Assumptions vs Reality
    assumption_set:
      action: "create_draft"
      note: "Begin drafting Assumption Set V1 with initial market/competitor beliefs from critique"

  - id: 3
    title: "Kill Gate"
    design_spec_title: "Market Validation & RAT"
    description: "Validate problem-solution fit, user willingness to pay, and technical feasibility."
    phase_number: 1
    phase_name: "THE TRUTH"
    work_type: decision_gate
    sd_required: false
    advisory_enabled: true  # ADVISORY CHECKPOINT
    depends_on: [2]
    inputs:
      - AI review report
      - Market research
      - User interviews
    outputs:
      - Validation report
      - User feedback
      - Feasibility assessment
    artifacts:
      - truth_validation_decision
    metrics:
      - Validation score (1-10)
      - WTP confidence
    gates:
      entry:
        - AI critique complete
      exit:
        - Validation score >= 6
        - Chairman decision: advance/revise/reject
    decision_options:
      - advance
      - revise
      - reject
    tier_cap: 3  # Tier 0 ventures capped at this stage
    # GOLDEN NUGGET: Assumptions vs Reality + Four Buckets
    assumption_set:
      action: "finalize_v1"
      note: "Finalize Assumption Set V1 with validated market beliefs, confidence scores"
    epistemic_classification:
      required: true
      note: "Decision gate - all claims must be classified as Facts/Assumptions/Simulations/Unknowns"

  - id: 4
    title: "Competitive Landscape"
    design_spec_title: "Competitive Intelligence"
    description: "Deep analysis of competitive landscape, market gaps, and positioning opportunities."
    phase_number: 1
    phase_name: "THE TRUTH"
    work_type: artifact_only
    sd_required: false
    advisory_enabled: false
    depends_on: [3]
    inputs:
      - Market validation results
      - Competitor data
      - Industry reports
    outputs:
      - Competitive analysis
      - Gap identification
      - Positioning strategy
    artifacts:
      - truth_competitive_analysis
    metrics:
      - Competitors identified
      - Gap opportunities scored

  - id: 5
    title: "Kill Gate (Financial)"
    design_spec_title: "Profitability Forecasting"
    description: "Financial modeling, unit economics validation, and ROI projections."
    phase_number: 1
    phase_name: "THE TRUTH"
    work_type: decision_gate
    sd_required: false
    advisory_enabled: true  # ADVISORY CHECKPOINT
    depends_on: [4]
    inputs:
      - Competitive analysis
      - Pricing assumptions
      - Cost structure
    outputs:
      - Financial model
      - Unit economics
      - ROI projections
    artifacts:
      - truth_financial_model
    metrics:
      - Gross margin target (40%+)
      - Breakeven months (<18)
      - CAC:LTV ratio (1:3+)
    gates:
      entry:
        - Competitive analysis complete
      exit:
        - Financial model complete
        - Unit economics viable
    # GOLDEN NUGGET: Assumptions vs Reality + Four Buckets + Token Budget
    assumption_set:
      action: "update"
      note: "Update Assumption Set with financial model inputs (pricing, costs, margins)"
    epistemic_classification:
      required: true
      note: "Decision gate - all financial claims must be classified"
    token_budget:
      action: "confirm_profile"
      note: "Confirm token budget profile (exploratory/standard/deep) for remaining stages"

  # ============================================================================
  # PHASE 2: THE ENGINE (Stages 6-9)
  # ============================================================================
  - id: 6
    title: "Risk Assessment"
    design_spec_title: "Risk Evaluation Matrix"
    description: "Comprehensive risk identification, probability assessment, and mitigation planning."
    phase_number: 2
    phase_name: "THE ENGINE"
    work_type: artifact_only
    sd_required: false
    advisory_enabled: false
    depends_on: [5]
    inputs:
      - Financial model
      - Market analysis
      - Technical assessment
    outputs:
      - Risk matrix
      - Mitigation strategies
      - Contingency plans
    artifacts:
      - engine_risk_matrix
    metrics:
      - Risks identified
      - Mitigation coverage
    gates:
      entry:
        - Financial model complete (Stage 5)
      exit:
        - Risk matrix artifact present (≥200 chars)
        - Epistemic classification complete (Facts/Assumptions/Simulations/Unknowns)
        - HIGH+ risks have mitigation strategies
    # COGNITIVE UPGRADE v2.6.0: Risk Matrix requires epistemic rigor
    epistemic_classification:
      required: true
      note: "Risk matrix must classify all claims - Facts (from financial model), Assumptions (market/customer), Simulations (projections), Unknowns (deliberate gaps)"
      validation_rule: "checkEpistemicClassification() in golden-nugget-validator.js"

  - id: 7
    title: "Revenue Architecture"
    design_spec_title: "Revenue Architecture"
    description: "Pricing model development, tier structure, and value-based pricing analysis."
    phase_number: 2
    phase_name: "THE ENGINE"
    work_type: artifact_only
    sd_required: false
    advisory_enabled: false
    depends_on: [6]
    inputs:
      - Financial model
      - Competitor pricing
      - Value analysis
    outputs:
      - Pricing model
      - Tier structure
      - Discount policies
    artifacts:
      - engine_pricing_model
    metrics:
      - Price sensitivity analysis
      - Margin optimization

  - id: 8
    title: "Business Model Canvas"
    design_spec_title: "Business Model Canvas"
    description: "Complete business model documentation using BMC framework."
    phase_number: 2
    phase_name: "THE ENGINE"
    work_type: artifact_only
    sd_required: false
    advisory_enabled: false
    depends_on: [7]
    inputs:
      - All previous analyses
      - Pricing strategy
      - Risk assessment
    outputs:
      - Business Model Canvas
      - Value propositions
      - Revenue streams
    artifacts:
      - engine_business_model_canvas
    metrics:
      - BMC completeness
      - Strategic alignment

  - id: 9
    title: "Exit Strategy"
    design_spec_title: "Exit Strategy"
    description: "Strategic exit planning, valuation targets, and acquisition-friendly architecture."
    phase_number: 2
    phase_name: "THE ENGINE"
    work_type: artifact_only
    sd_required: false
    advisory_enabled: false
    depends_on: [8]
    inputs:
      - Business model
      - Market multiples
      - Comparable exits
    outputs:
      - Exit strategy
      - Valuation targets
      - Timeline planning
    artifacts:
      - engine_exit_strategy
    metrics:
      - Exit scenarios defined
      - Valuation methodology

  # ============================================================================
  # PHASE 3: THE IDENTITY (Stages 10-12)
  # ============================================================================
  - id: 10
    title: "Customer & Brand Foundation"
    design_spec_title: "Customer & Brand Foundation"
    description: "Customer personas, brand genome grounded in persona insights, naming, and Chairman governance gate."
    phase_number: 3
    phase_name: "THE IDENTITY"
    work_type: sd_required
    sd_required: true
    sd_suffix: "BRAND"
    advisory_enabled: false
    depends_on: [9]
    inputs:
      - Business model
      - Target audience
      - Competitive positioning
      - Industry vertical (for cultural style inference)
    outputs:
      - Brand name
      - Brand guidelines
      - Visual identity specs
      - Cultural design style selection
    artifacts:
      - identity_brand_guidelines
      - identity_persona_brand
    metrics:
      - Name availability
      - Brand strength score
      - Cultural style alignment score
    # Cultural Design Style Configuration
    # References: docs/02_api/design_system_handcrafted.md (Stage 55 PRD)
    cultural_design_styles:
      wabi_sabi:
        name: "Wabi-sabi (Japanese)"
        best_for: ["wellness", "artisanal", "premium lifestyle", "sustainability"]
        characteristics: "Organic asymmetry, intentional imperfection, natural warmth"
        variance: "5% spacing, 10% desaturation, 15% off-center positioning"
      swiss_minimal:
        name: "Swiss Minimal"
        best_for: ["fintech", "enterprise B2B", "legal", "healthcare"]
        characteristics: "Grid precision with intentional breaks, high legibility, trust"
        variance: "2% grid deviation, golden ratio typography, 7:1 contrast"
      bauhaus:
        name: "Bauhaus"
        best_for: ["architecture", "manufacturing", "design tools", "education"]
        characteristics: "Form follows function with character, geometric primitives"
        variance: "3% corner softening, 10% vibrance boost, geometric shapes"
      california_modern:
        name: "California Modern"
        best_for: ["consumer apps", "SaaS", "social platforms", "startups"]
        characteristics: "Optimistic functionality, warm minimalism, approachable"
        variance: "15% brightness, 5% warmer colors, 10% breathing room"
    style_selection_rules:
      - "Style is selected during Stage 10 based on venture vertical and target audience"
      - "Style persists to all UI components via venture.cultural_design_style field"
      - "Design sub-agent applies style rules from handcrafted design PRD"
      - "Style can be overridden per-component when justified"

  - id: 11
    title: "Naming & Visual Identity"
    design_spec_title: "Go-to-Market Strategy"
    description: "Brand name candidates, visual identity system, and cultural design style application."
    phase_number: 3
    phase_name: "THE IDENTITY"
    work_type: artifact_only
    sd_required: false
    advisory_enabled: false
    depends_on: [10]
    inputs:
      - Brand identity
      - Target segments
      - Competitive position
    outputs:
      - GTM plan
      - Marketing manifest
      - Channel strategy
    artifacts:
      - identity_naming_visual
      - identity_persona_brand
      - brand_messaging_options  # Tournament output
    metrics:
      - Channel coverage
      - Launch readiness
    # GOLDEN NUGGET: Crew Tournament Pilot (Chairman Fast-Follow)
    crew_tournament:
      enabled: true
      pilot: true
      note: "Tournament-style agent competition for brand messaging (3 workers, 1 manager)"
      config_reference: "golden_nuggets.crew_tournament_pilot"
      artifacts_produced: ["brand_messaging_options"]

  - id: 12
    title: "GTM & Sales Strategy"
    design_spec_title: "Sales & Success Logic"
    description: "Go-to-market strategy, sales playbook, and customer success workflows."
    phase_number: 3
    phase_name: "THE IDENTITY"
    work_type: artifact_only
    sd_required: false
    advisory_enabled: false
    depends_on: [11]
    inputs:
      - GTM strategy
      - Customer segments
      - Product capabilities
    outputs:
      - Sales playbook
      - Success workflows
      - Support model
    artifacts:
      - identity_gtm_sales_strategy
    metrics:
      - Process completeness
      - Handoff clarity

  # ============================================================================
  # PHASE 4: THE BLUEPRINT (Stages 13-17) - "Kochel Firewall"
  # ============================================================================
  - id: 13
    title: "Product Roadmap"
    design_spec_title: "Tech Stack Interrogation"
    description: "Product roadmap with milestones, dependencies, and timeline. Kill gate enforces roadmap completeness."
    phase_number: 4
    phase_name: "THE BLUEPRINT"
    work_type: decision_gate
    sd_required: false
    advisory_enabled: false
    depends_on: [12]
    inputs:
      - Business requirements
      - Scale projections
      - Team capabilities
    outputs:
      - Tech stack decision
      - Architecture rationale
      - Trade-off analysis
    artifacts:
      - blueprint_product_roadmap
    metrics:
      - Decision confidence
      - Future-proofing score

  - id: 14
    title: "Technical Architecture"
    design_spec_title: "Data Model & Architecture"
    description: "Technical architecture definition with required stack layers, security, data entities, and integration points."
    phase_number: 4
    phase_name: "THE BLUEPRINT"
    work_type: sd_required
    sd_required: true
    sd_suffix: "DATAMODEL"
    advisory_enabled: false
    depends_on: [13]
    inputs:
      - Tech stack decision
      - Business entities
      - Integration requirements
    outputs:
      - Data model
      - ERD diagrams
      - Schema specifications
    artifacts:
      - blueprint_data_model
      - blueprint_erd_diagram
    metrics:
      - Entity coverage
      - Relationship clarity

  - id: 15
    title: "Design Studio"
    design_spec_title: "Design Studio"
    description: "Wireframe generation, visual convergence, and design materialization. Translates technical architecture into visual design artifacts."
    phase_number: 4
    phase_name: "THE BLUEPRINT"
    work_type: artifact_only
    sd_required: false
    sd_suffix: null
    advisory_enabled: false
    depends_on: [14]
    inputs:
      - Brand genome (Stage 10)
      - Technical architecture (Stage 14)
    outputs:
      - Blueprint wireframes
      - Visual convergence report
    artifacts:
      - blueprint_wireframes
    metrics:
      - Wireframe completeness
      - Visual convergence score

  - id: 16
    title: "Financial Projections"
    design_spec_title: "Spec-Driven Schema Generation"
    description: "Financial projections with revenue/cost data, runway calculation, burn rate, break-even analysis, and Phase 4→5 Promotion Gate."
    phase_number: 4
    phase_name: "THE BLUEPRINT"
    work_type: decision_gate
    sd_required: true
    sd_suffix: "SCHEMA"
    advisory_enabled: true  # ADVISORY CHECKPOINT - Schema Firewall
    depends_on: [15]
    inputs:
      - User stories
      - Data model
      - API requirements
    outputs:
      - TypeScript interfaces
      - SQL schemas
      - API contracts
    artifacts:
      - blueprint_api_contract
      - blueprint_schema_spec
    metrics:
      - Schema completeness
      - Type coverage
    schema_checklist:
      - All entities named
      - All relationships explicit
      - All fields typed
      - All constraints stated
      - API contracts generated
      - TypeScript interfaces generated
    # GOLDEN NUGGET: Four Buckets - Schema Firewall requires full epistemic classification
    epistemic_classification:
      required: true
      note: "Schema Firewall - all schema decisions must have epistemic classification (Facts/Assumptions/Unknowns)"

  # ============================================================================
  # PHASE 5: THE BUILD LOOP (Stages 18-23)
  # ============================================================================
  - id: 17
    title: "Pre-Build Checklist"
    design_spec_title: "Environment & Agent Config"
    description: "Pre-build validation checklist ensuring environment, dependencies, and configuration are ready."
    phase_number: 5
    phase_name: "THE BUILD LOOP"
    work_type: sd_required
    sd_required: true
    sd_suffix: "ENVCONFIG"
    advisory_enabled: false
    depends_on: [16]
    inputs:
      - Tech stack decision
      - Schema specifications
      - Team requirements
    outputs:
      - Environment setup
      - System prompts
      - CI/CD pipeline
    artifacts:
      - build_system_prompt
      - build_cicd_config
    metrics:
      - Environment readiness
      - Agent effectiveness

  - id: 18
    title: "Sprint Planning"
    design_spec_title: "MVP Development Loop"
    description: "Sprint planning with story prioritization, capacity estimation, and acceptance criteria."
    phase_number: 5
    phase_name: "THE BUILD LOOP"
    work_type: sd_required
    sd_required: true
    sd_suffix: "MVP"
    advisory_enabled: false
    depends_on: [17]
    inputs:
      - User stories
      - Schema specifications
      - Environment config
    outputs:
      - Working code
      - Feature implementations
      - Technical debt log
    artifacts: []
    metrics:
      - Story completion rate
      - Code quality score

  - id: 19
    title: "Build Execution"
    design_spec_title: "Integration & API Layer"
    description: "Core build execution with feature implementation, integration, and technical debt tracking."
    phase_number: 5
    phase_name: "THE BUILD LOOP"
    work_type: sd_required
    sd_required: true
    sd_suffix: "INTEGRATION"
    advisory_enabled: false
    depends_on: [18]
    inputs:
      - MVP implementation
      - API contracts
      - External services
    outputs:
      - Integrated system
      - API endpoints
      - Integration tests
    artifacts: []
    metrics:
      - API coverage
      - Integration success rate

  - id: 20
    title: "Quality Assurance"
    design_spec_title: "Security & Performance"
    description: "Quality assurance including security hardening, performance optimization, and accessibility compliance."
    phase_number: 5
    phase_name: "THE BUILD LOOP"
    work_type: sd_required
    sd_required: true
    sd_suffix: "SECURITY"
    advisory_enabled: false
    depends_on: [19]
    inputs:
      - Integrated system
      - Security requirements
      - Performance targets
    outputs:
      - Hardened system
      - Performance metrics
      - Security audit
    artifacts:
      - build_security_audit
    metrics:
      - Security scan clean
      - Performance targets met
      - WCAG 2.1 AA compliant

  # (Still Phase 5: THE BUILD LOOP)
  - id: 21
    title: "Build Review"
    design_spec_title: "QA & UAT"
    description: "Integration testing, build review, and acceptance verification before release."
    phase_number: 5
    phase_name: "THE BUILD LOOP"
    work_type: sd_required
    sd_required: true
    sd_suffix: "QA"
    advisory_enabled: false
    depends_on: [20]
    inputs:
      - Hardened system
      - Test scenarios
      - User test cases
    outputs:
      - Test reports
      - Bug fixes
      - UAT signoff
    artifacts:
      - launch_test_plan
      - launch_uat_report
    metrics:
      - Test coverage >= 80%
      - Bug resolution rate
      - UAT pass rate

  - id: 22
    title: "Release Readiness"
    design_spec_title: "Deployment & Infrastructure"
    description: "Release readiness gate with deployment checklist, infrastructure provisioning, and Phase 5→6 Promotion Gate."
    phase_number: 5
    phase_name: "THE BUILD LOOP"
    work_type: sd_required
    sd_required: true
    sd_suffix: "DEPLOY"
    advisory_enabled: false
    depends_on: [21]
    inputs:
      - QA-passed system
      - Infrastructure specs
      - Deployment plan
    outputs:
      - Deployed system
      - Monitoring setup
      - Runbooks
    artifacts:
      - launch_deployment_runbook
    metrics:
      - Deployment success
      - Monitoring coverage

  # ============================================================================
  # PHASE 6: THE LAUNCH (Stages 24-26)
  # ============================================================================
  - id: 23
    title: "Marketing Preparation"
    design_spec_title: "Production Launch"
    description: "Pre-launch marketing preparation including asset creation, channel readiness, and go-live checklist."
    phase_number: 6
    phase_name: "THE LAUNCH"
    work_type: decision_gate
    sd_required: false
    advisory_enabled: false
    depends_on: [22]
    inputs:
      - Deployed system
      - Launch checklist
      - Marketing assets
    outputs:
      - Live product
      - Launch metrics
      - User feedback
    artifacts:
      - launch_marketing_checklist
    metrics:
      - Launch checklist complete
      - Initial users onboarded
    # GOLDEN NUGGET: Assumptions vs Reality - Reality data collection begins
    assumption_set:
      action: "begin_reality_collection"
      note: "Launch triggers reality data collection against Assumption Set V1"

  - id: 24
    title: "Launch Readiness"
    design_spec_title: "Analytics & Feedback"
