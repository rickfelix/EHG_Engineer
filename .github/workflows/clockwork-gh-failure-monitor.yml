name: "Clockwork: GH Failure Monitor"

on:
  schedule:
    # Hourly — keeps CI failure signal fresh for /inbox triage
    - cron: '15 * * * *'
  workflow_dispatch:
    # Manual trigger for testing

permissions:
  actions: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run GH Failure Monitor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_TOKEN: ${{ github.token }}
          GH_MONITOR_REPO: rickfelix/EHG_Engineer
          GH_MONITOR_LOOKBACK_HOURS: '2'
        run: node scripts/clockwork/gh-failure-monitor.cjs
