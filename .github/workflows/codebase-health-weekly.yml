name: "Clockwork: Codebase Health Scan"

on:
  schedule:
    # Run every Sunday at 8 AM UTC (between pattern-maintenance at 6 AM and gate-health at 7 AM)
    - cron: '0 8 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no SD generation)'
        required: false
        default: 'false'
        type: boolean
      dimension:
        description: 'Scan a specific dimension only (dead_code, coverage_trend, complexity)'
        required: false
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  health-scan:
    name: Codebase Health Scan
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run codebase health scan
        id: health_scan
        run: |
          FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          if [ -n "${{ inputs.dimension }}" ]; then
            FLAGS="$FLAGS --dimension ${{ inputs.dimension }}"
          fi

          echo "Running health scan with flags: $FLAGS"
          node scripts/eva/health-dimensions/codebase-health-scan.mjs $FLAGS --json > health-report.txt 2>&1 || echo "SCAN_FAILED=true" >> $GITHUB_ENV
          cat health-report.txt

          # Extract status for downstream steps
          grep "HEALTH_SCAN_STATUS=" health-report.txt | tail -1 >> $GITHUB_ENV || true
          grep "HEALTH_SCAN_SCORE=" health-report.txt | tail -1 >> $GITHUB_ENV || true
          grep "HEALTH_SCAN_DIMENSION=" health-report.txt | tail -1 >> $GITHUB_ENV || true

      - name: Upload health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codebase-health-report-${{ github.run_number }}
          path: health-report.txt
          retention-days: 30

      - name: Create issue if health needs attention
        if: env.HEALTH_SCAN_STATUS == 'NEEDS_ATTENTION' || env.SCAN_FAILED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('health-report.txt', 'utf8');
            const score = process.env.HEALTH_SCAN_SCORE || 'unknown';
            const dimension = process.env.HEALTH_SCAN_DIMENSION || 'unknown';
            const failed = process.env.SCAN_FAILED === 'true';

            const title = failed
              ? '❌ Codebase Health Scan Failed'
              : `⚠️ Codebase Health Alert: ${dimension} at ${score}/100`;

            // Check for existing open health issues this week
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'automated,codebase-health,clockwork',
              state: 'open',
              per_page: 5
            });

            const weekStart = new Date();
            weekStart.setDate(weekStart.getDate() - weekStart.getDay());
            const recentIssue = existingIssues.data.find(issue =>
              new Date(issue.created_at) >= weekStart
            );

            const body = [
              '## Codebase Health Scan Report',
              '',
              failed ? 'The health scan encountered an error.' : `Dimension **${dimension}** scored **${score}/100** — below threshold.`,
              '',
              '```',
              report.slice(0, 3000),
              '```',
              '',
              '## Action Required',
              '',
              '1. Run `npm run health:report` locally for full details',
              '2. Run `npm run health:scan` to re-scan',
              '3. Check `codebase_health_snapshots` table for trends',
              '',
              `🔗 **Workflow Run:** [View Details](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              '',
              '**Auto-generated by Clockwork: codebase-health-weekly.yml**'
            ].join('\n');

            if (recentIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: recentIssue.number,
                body: `## Weekly Update: ${new Date().toISOString().split('T')[0]}\n\n${body}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['automated', 'codebase-health', 'clockwork']
              });
            }

      - name: Post summary
        if: always()
        run: |
          echo "## Codebase Health Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "$HEALTH_SCAN_SCORE" ]; then
            echo "**Worst dimension:** $HEALTH_SCAN_DIMENSION at $HEALTH_SCAN_SCORE/100" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${HEALTH_SCAN_STATUS:-COMPLETE}" >> $GITHUB_STEP_SUMMARY
