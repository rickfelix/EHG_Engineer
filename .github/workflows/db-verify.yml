name: DB Verify

# Path filter narrowed by SD-LEO-INFRA-SHIP-AUTO-MERGE-001 (was: db/**, ops/**, docs/**).
# `docs/**` made every documentation PR trigger this workflow, which then red-failed
# on empty PG*_STAGING secrets — turning every PR's mergeStateStatus to UNSTABLE and
# blocking /ship auto-merge on PRs that don't touch the database at all.
on:
  pull_request:
    paths:
      - 'db/**'
      - 'ops/**'
      - 'database/migrations/**'
      - 'apps/ingest/**'
      # Re-run on workflow changes so edits to this file self-validate.
      - '.github/workflows/db-verify.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      PGHOST: ${{ secrets.PGHOST_STAGING }}
      PGDATABASE: ${{ secrets.PGDATABASE_STAGING }}
      PGUSER: ${{ secrets.PGUSER_STAGING }}
      PGPASSWORD: ${{ secrets.PGPASSWORD_STAGING }}
    steps:
      - uses: actions/checkout@v4
      - name: Check secrets configured
        id: check_secrets
        run: |
          if [ -z "$PGHOST" ] || [ -z "$PGDATABASE" ] || [ -z "$PGUSER" ] || [ -z "$PGPASSWORD" ]; then
            echo "::warning::PG*_STAGING secrets are not configured — skipping migration apply and verify steps. Configure repo secrets to enable real verification."
            echo "secrets_configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "secrets_configured=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Install tooling
        if: steps.check_secrets.outputs.secrets_configured == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: Apply migrations
        if: steps.check_secrets.outputs.secrets_configured == 'true'
        run: bash ops/scripts/staging_apply.sh
      - name: Verify database objects
        if: steps.check_secrets.outputs.secrets_configured == 'true'
        run: bash ops/scripts/run_checks.sh
      - name: Policy regression scan
        run: |
          if grep -R "GRANT ALL" -n db/policies; then
            echo 'Forbidden pattern detected (GRANT ALL)';
            exit 1;
          fi
          # Match bare eng_* identifiers (eng_ followed by a letter), then
          # exclude legitimate references:
          #   - v_eng_*: view naming convention
          #   - views.eng_*: schema-qualified view access (still through a view)
          # The bare-identifier regex sidesteps doc-comment text like `eng_*`
          # (no letter after underscore) which the prior literal-substring grep flagged.
          if grep -REn '\beng_[a-zA-Z]' apps/ingest | grep -v 'v_eng_' | grep -v 'views\.eng_'; then
            echo 'Forbidden direct eng_* usage detected in app code';
            exit 1;
          fi
