name: "Periodic-process liveness watcher (cron)"

# SD-LEO-INFRA-OPERATIVE-AGENT-OWNERSHIP-001-A (FR-5) — the watcher-of-watchers previously had
# only a session-bound invoker (coordinator STANDARD_LOOPS entry, dies with the session). This
# workflow is its durable invoker, mirroring eva-scheduler-watcher-cron.yml.
#
# CLASS-SPLIT (TR-1): this CI venue evaluates ONLY timestamp-source rows
# (self_stamped, eva_scheduler_heartbeat). role_session rows are PID-anchored via host-local
# checks (lib/fleet/session-liveness.cjs hasPidAlive) that cannot resolve from a CI runner —
# evaluating them here would false-OVERDUE every live session. Their evaluation stays with the
# dev-host STANDARD_LOOPS entry, which runs the complementary filter
# (LIVENESS_CLASSES=claude_sessions_heartbeat) so no row is double-evaluated.

on:
  schedule:
    # Every 15 minutes — matches the __watcher_self__ 900s expected interval.
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  watch:
    name: Evaluate timestamp-source registry rows
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      LIVENESS_CLASSES: self_stamped,eva_scheduler_heartbeat

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run watcher (timestamp classes only)
        run: node scripts/periodic-liveness-watcher.mjs
