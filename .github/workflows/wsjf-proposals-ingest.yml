name: WSJF Proposals Ingest

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - prod
        default: staging

permissions:
  contents: read

concurrency:
  group: wsjf-proposals-ingest-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  ingest:
    if: >-
      (inputs.environment == 'staging' && vars.ENABLE_WSJF_INGEST == '1') ||
      (inputs.environment == 'prod' && vars.ENABLE_PROD_INGEST == '1')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Configure database connection (staging)
        if: inputs.environment == 'staging'
        run: |
          echo "PGHOST=${{ secrets.PGHOST_STAGING }}" >> $GITHUB_ENV
          echo "PGPORT=${{ secrets.PGPORT_STAGING }}" >> $GITHUB_ENV
          echo "PGDATABASE=${{ secrets.PGDATABASE_STAGING }}" >> $GITHUB_ENV
          echo "PGUSER=${{ secrets.PGUSER_STAGING }}" >> $GITHUB_ENV
          echo "PGPASSWORD=${{ secrets.PGPASSWORD_STAGING }}" >> $GITHUB_ENV
          echo "PGSSLMODE=require" >> $GITHUB_ENV

      - name: Configure database connection (prod)
        if: inputs.environment == 'prod'
        run: |
          echo "PGHOST=${{ secrets.PGHOST_PROD }}" >> $GITHUB_ENV
          echo "PGPORT=${{ secrets.PGPORT_PROD }}" >> $GITHUB_ENV
          echo "PGDATABASE=${{ secrets.PGDATABASE_PROD }}" >> $GITHUB_ENV
          echo "PGUSER=${{ secrets.PGUSER_PROD }}" >> $GITHUB_ENV
          echo "PGPASSWORD=${{ secrets.PGPASSWORD_PROD }}" >> $GITHUB_ENV
          echo "PGSSLMODE=require" >> $GITHUB_ENV

      - name: Generate fresh WSJF CSV (read-only)
        run: |
          mkdir -p ops/checks/out
          psql -v ON_ERROR_STOP=1 \
               -v W_BV="${{ vars.W_BV || '1.2' }}" \
               -v W_TC="${{ vars.W_TC || '1.0' }}" \
               -v W_RR="${{ vars.W_RR || '0.9' }}" \
               -v W_JS="${{ vars.W_JS || '1.0' }}" \
               -v MAX_MOVE="${{ vars.MAX_MOVE || '2' }}" \
               -f ops/checks/wsjf_recommendations_staging.sql

      - name: Ingest WSJF recommendations (DRY-RUN by default)
        run: |
          mkdir -p ops/checks/out
          psql -v ON_ERROR_STOP=1 \
               -v DRY_RUN="${{ vars.DRY_RUN || '1' }}" \
               -v MAX_MOVE="${{ vars.MAX_MOVE || '2' }}" \
               -v CSV_PATH="ops/checks/out/wsjf_recommendations.csv" \
               -v PROPOSED_BY="wsjf" \
               -f ops/jobs/wsjf_proposals_ingest_staging.sql

      - name: Summary
        run: |
          echo "### WSJF Proposals Ingest (${{ inputs.environment }})" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- DRY_RUN: ${{ vars.DRY_RUN || '1' }}" >> $GITHUB_STEP_SUMMARY
          echo "- MAX_MOVE: ${{ vars.MAX_MOVE || '2' }}" >> $GITHUB_STEP_SUMMARY
          if [ -f ops/checks/out/wsjf_ingest_results.csv ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Recent proposals (status / proposed_execution_order):" >> $GITHUB_STEP_SUMMARY
            head -n 11 ops/checks/out/wsjf_ingest_results.csv | tail -n +2 | awk -F, '{printf "- %s / %s / %s\n",$1,$2,$3}' >> $GITHUB_STEP_SUMMARY || true
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wsjf-ingest-${{ inputs.environment }}-${{ github.run_id }}
          path: ops/checks/out/wsjf_ingest_results.csv
          retention-days: 30
