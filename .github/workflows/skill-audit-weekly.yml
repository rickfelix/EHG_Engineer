name: "Clockwork: Skill Audit"

on:
  schedule:
    # Run every Monday at 11 AM UTC (after Skunkworks at 10:30 AM)
    - cron: '0 11 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  skill-audit:
    name: Skill Quality Audit
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run skill audit
        id: audit
        run: |
          npm run skill:audit -- --json > skill-audit-report.txt 2>&1 || echo "AUDIT_FAILED=true" >> $GITHUB_ENV
          cat skill-audit-report.txt

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-audit-report-${{ github.run_number }}
          path: skill-audit-report.txt
          retention-days: 30

      - name: Create issue if audit found problems
        if: env.AUDIT_FAILED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('skill-audit-report.txt', 'utf8');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Weekly Skill Audit Found Issues',
              body: [
                '## Skill Audit Report',
                '',
                'The automated weekly skill audit found quality issues.',
                '',
                '```',
                report.slice(0, 3000),
                '```',
                '',
                '## Action Required',
                '',
                '1. Run `npm run skill:audit` locally for full details',
                '2. Review skill definitions in `.claude/skills/`',
                '3. Update skills with missing or low-quality rubrics',
                '',
                `🔗 **Workflow Run:** [View Details](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                '**Auto-generated by Clockwork: skill-audit-weekly.yml**'
              ].join('\n'),
              labels: ['automated', 'skill-quality', 'clockwork']
            });

      - name: Post summary
        if: always()
        run: |
          echo "## Skill Audit Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f skill-audit-report.txt ]; then
            tail -20 skill-audit-report.txt >> $GITHUB_STEP_SUMMARY
          fi
