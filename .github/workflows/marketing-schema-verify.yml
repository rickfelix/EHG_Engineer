name: Marketing Schema Verify

on:
  pull_request:
    paths:
      - 'config/marketing-schema-manifest.json'
      - 'scripts/verify-marketing-schema.mjs'
      - 'database/migrations/**'
  push:
    branches: [main]
    paths:
      - 'config/marketing-schema-manifest.json'
      - 'scripts/verify-marketing-schema.mjs'
      - 'database/migrations/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Marketing Schema Verify
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run verifier
        env:
          SUPABASE_POOLER_URL: ${{ secrets.SUPABASE_POOLER_URL }}
          # SD-FDBK-INFRA-RESTORE-STRICT-TLS-001 (FR-3): trust the committed
          # Supabase CA instead of disabling verification. verify-marketing-schema.mjs
          # also auto-detects this bundle via getSSLConfig() (FR-2/FR-4).
          NODE_EXTRA_CA_CERTS: ${{ github.workspace }}/certs/supabase-root-2021-ca.pem
        run: |
          if [ -z "$SUPABASE_POOLER_URL" ]; then
            echo "::warning::SUPABASE_POOLER_URL secret not set — skipping live schema verify"
            exit 0
          fi
          node scripts/verify-marketing-schema.mjs
