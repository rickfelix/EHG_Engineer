name: "Cost governor (cron)"

# SD-LEO-INFRA-COST-TOKEN-GOVERNANCE-001 (operator-contract ARMED CADENCE).
# Always-on GitHub Actions cadence that fires the enforcing cost governor in OBSERVE mode:
# self-tunes thresholds, stamps the periodic_process_registry cadence witness, and surfaces
# cost anomalies fail-LOUD (a breach reddens this run). Independent of any coordinator session.
# Enforce-mode activation is a deliberate shadow-validated follow-on — this cadence never enforces.

on:
  schedule:
    # Daily at 06:17 UTC, offset to dodge the ~15min crons and the retention-enforce weekly run.
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  govern:
    name: Run the cost governor (observe-only)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run the cost governor (tune + cadence stamp + fail-loud anomaly check)
        run: node scripts/cost-governor-cron.mjs
