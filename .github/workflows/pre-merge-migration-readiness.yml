name: Pre-merge Migration Readiness

# SD-LEO-INFRA-PRE-MERGE-MIGRATION-001 FR-1.
# Runs on PRs touching database/migrations/*.sql and detects when a
# CREATE OR REPLACE FUNCTION migration declares a body that diverges
# from the live DB (someone forgot to apply). Defense-in-depth for
# PAT-LEO-INFRA-DDL-CODE-DB-STATE-DRIFT-001.

on:
  pull_request:
    paths:
      - 'database/migrations/*.sql'
  workflow_dispatch:

jobs:
  check-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: pre-merge-migration-readiness-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Assert secrets present
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          [ -n "$SUPABASE_URL" ] || { echo "[MIGRATION_READINESS_INFRA_ERROR] SUPABASE_URL missing"; exit 2; }
          [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] || { echo "[MIGRATION_READINESS_INFRA_ERROR] SUPABASE_SERVICE_ROLE_KEY missing"; exit 2; }
      - run: npm ci --no-audit --no-fund
      - name: Run pre-merge migration-readiness probe
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_POOLER_URL: ${{ secrets.SUPABASE_POOLER_URL }}
          # QF-20260513-258: DATABASE_URL is a fallback used by
          # check-migration-readiness.mjs when SUPABASE_POOLER_URL is unset.
          # Either env var is sufficient — supabase-connection.js skips the
          # password requirement once connectionString is provided.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # QF-20260521-275 (PAT-CI-DB-TLS-VERIFY-GAP-001): the GitHub-hosted runner's
          # trust store does not include the Supabase pooler chain, so getSSLConfig()'s
          # default rejectUnauthorized:true throws "self-signed certificate in
          # certificate chain" and the probe hard-fails (INFRA_ERROR, exit 2) on every
          # migration PR even when the migration is correct (e.g. PR #3815). This is
          # the same TLS-relaxation the sibling DB workflows rely on. DISABLE_SSL_VERIFY
          # (not NODE_TLS_REJECT_UNAUTHORIZED=0, which pg's explicit per-socket option
          # overrides) is the lever getSSLConfig() honors. Read-only pg_proc/pg_trigger
          # introspection from an ephemeral runner to a known host — residual risk accepted.
          DISABLE_SSL_VERIFY: 'true'
        run: |
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            node scripts/check-migration-readiness.mjs --pr ${{ github.event.pull_request.number }}
          else
            node scripts/check-migration-readiness.mjs
          fi
