name: Pre-merge Migration Readiness

# SD-LEO-INFRA-PRE-MERGE-MIGRATION-001 FR-1.
# Runs on PRs touching database/migrations/*.sql and detects when a
# CREATE OR REPLACE FUNCTION migration declares a body that diverges
# from the live DB (someone forgot to apply). Defense-in-depth for
# PAT-LEO-INFRA-DDL-CODE-DB-STATE-DRIFT-001.

on:
  pull_request:
    paths:
      - 'database/migrations/*.sql'
  workflow_dispatch:

jobs:
  check-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: pre-merge-migration-readiness-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Assert secrets present
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          [ -n "$SUPABASE_URL" ] || { echo "[MIGRATION_READINESS_INFRA_ERROR] SUPABASE_URL missing"; exit 2; }
          [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] || { echo "[MIGRATION_READINESS_INFRA_ERROR] SUPABASE_SERVICE_ROLE_KEY missing"; exit 2; }
      - run: npm ci --no-audit --no-fund
      - name: Run pre-merge migration-readiness probe
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_POOLER_URL: ${{ secrets.SUPABASE_POOLER_URL }}
          # QF-20260513-258: DATABASE_URL is a fallback used by
          # check-migration-readiness.mjs when SUPABASE_POOLER_URL is unset.
          # Either env var is sufficient — supabase-connection.js skips the
          # password requirement once connectionString is provided.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # SD-FDBK-INFRA-RESTORE-STRICT-TLS-001 (FR-3, reverses QF-20260521-494):
          # the pg-direct probe connects to the Supabase pooler, whose self-signed
          # Supabase Root 2021 CA is absent from the runner trust store. Trust that
          # CA explicitly via the committed bundle (also auto-detected by
          # getSSLConfig per FR-2) instead of disabling verification, restoring
          # strict TLS on this gate.
          NODE_EXTRA_CA_CERTS: ${{ github.workspace }}/certs/supabase-root-2021-ca.pem
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # QF-20260521-494: INFRA_ERROR (exit 2) means the probe could not run
          # (DB unreachable / secret missing) — that is environmental, NOT a
          # readiness verdict. Surface it as a non-blocking warning so it
          # neither red-Xes the PR (this gate is advisory defense-in-depth) nor
          # spawns immortal ci_failure feedback rows (auto-resolve-recovered
          # needs K successful re-runs, which a never-succeeding gate can never
          # produce). A real divergence/conflict (exit 1) STILL fails the gate.
          set +e
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            node scripts/check-migration-readiness.mjs --pr ${{ github.event.pull_request.number }}
          else
            node scripts/check-migration-readiness.mjs
          fi
          code=$?
          if [ "$code" = "2" ]; then
            echo "::warning::Pre-merge migration-readiness probe could not run (INFRA_ERROR, exit 2); advisory check skipped — not blocking. See log above."
            exit 0
          fi
          exit "$code"
