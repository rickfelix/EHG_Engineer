name: "Clockwork: Skunkworks Monday Batch"

on:
  schedule:
    # Run every Monday at 10 AM UTC (after DOCMON at 10 AM — stagger by 30 min)
    - cron: '30 10 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  issues: write

jobs:
  skunkworks-batch:
    name: Skunkworks Proposal Generator
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Skunkworks Monday Batch
        id: batch
        run: |
          node scripts/skunkworks/run-batch.js > skunkworks-report.txt 2>&1 || echo "BATCH_FAILED=true" >> $GITHUB_ENV
          cat skunkworks-report.txt

      - name: Upload batch report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skunkworks-batch-report-${{ github.run_number }}
          path: skunkworks-report.txt
          retention-days: 30

      - name: Create issue if batch failed
        if: env.BATCH_FAILED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('skunkworks-report.txt', 'utf8');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Skunkworks Monday Batch Failed',
              body: [
                '## Skunkworks Monday Batch Report',
                '',
                'The automated Monday R&D proposal generation batch failed.',
                '',
                '```',
                report.slice(0, 3000),
                '```',
                '',
                '## Action Required',
                '',
                '1. Review the error output above',
                '2. Run `node scripts/skunkworks/run-batch.js --dry-run` locally to debug',
                '3. Check `rd_batch_runs` table for error logs',
                '',
                `🔗 **Workflow Run:** [View Details](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                '**Auto-generated by Clockwork: skunkworks-monday-batch.yml**'
              ].join('\n'),
              labels: ['automated', 'skunkworks', 'clockwork']
            });
