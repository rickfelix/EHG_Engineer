name: "Adam chairman exec email (cron)"

# SD: SD-LEO-INFRA-ADAM-PREFERENCE-LEARNING-001 (FR-3)
#
# Schedules the Adam chairman executive summary (scripts/adam-exec-summary.mjs) — the
# chairman-chosen proactive channel — which previously had NO schedule (manual only, not
# in package.json, no cron). Per the cadence contract this MUST be GitHub-Actions cron, NOT
# pg_cron (no migration).
#
# OBSERVE-ONLY BRING-UP: the scheduled run sends a REAL email ONLY when the repo variable
# ADAM_EMAIL_LIVE == 'true'. Until the operator sets that variable (and the RESEND_API_KEY /
# CLAUDE_NOTIFY_EMAIL secrets), every run is --dry-run (logs the summary, sends nothing) — so
# merging this workflow cannot email anyone unconfigured. The workflow_dispatch dry_run input
# forces a dry-run even when ADAM_EMAIL_LIVE is set (for safe manual testing).

on:
  schedule:
    # Hourly (chairman-chosen cadence 2026-06-10, 24/day) — the always-on proactive
    # chairman artifact. Fires at :17 past the hour (NOT :00) to dodge GitHub Actions'
    # top-of-hour scheduling congestion, where queued runs are routinely delayed or
    # dropped — so the hourly email actually lands. Count is unchanged (24/day).
    - cron: '17 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Force dry-run (no send) even if ADAM_EMAIL_LIVE is set"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  exec-email:
    name: Send chairman exec email
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      CLAUDE_NOTIFY_EMAIL: ${{ secrets.CLAUDE_NOTIFY_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # SD-LEO-INFRA-VISION-GAUGE-HISTORIZE-001 (FR-2): historize the vision gauge on the SAME hourly
      # cadence as this email, so each run appends one auditable snapshot to vision_build_gauge and the
      # send step below renders a trend that includes the fresh point. continue-on-error so a writer
      # failure (e.g. a transient DB error) can NEVER block the chairman email; the writer is itself
      # fail-soft (a doc-unavailable run is recorded as available=false, never a missing row). The job's
      # concurrency:cancel-in-progress keeps this append-only (one snapshot per scheduled run).
      - name: Historize the vision gauge (append one snapshot)
        continue-on-error: true
        run: npm run vision:gauge

      - name: Send chairman exec email (observe-only until ADAM_EMAIL_LIVE repo var = true)
        run: |
          ARGS="--dry-run"
          if [ "${{ vars.ADAM_EMAIL_LIVE }}" = "true" ] && [ "${{ github.event.inputs.dry_run }}" != "true" ]; then
            ARGS=""
          fi
          echo "Running adam:exec:email:cron ${ARGS:-(LIVE send)}"
          npm run adam:exec:email:cron -- $ARGS
