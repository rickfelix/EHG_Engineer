name: "Adam chairman exec email (cron)"

# SD: SD-LEO-INFRA-ADAM-PREFERENCE-LEARNING-001 (FR-3)
#
# Schedules the Adam chairman executive summary (scripts/adam-exec-summary.mjs) — the
# chairman-chosen proactive channel — which previously had NO schedule (manual only, not
# in package.json, no cron). Per the cadence contract this MUST be GitHub-Actions cron, NOT
# pg_cron (no migration).
#
# OBSERVE-ONLY BRING-UP: the scheduled run sends a REAL email ONLY when the repo variable
# ADAM_EMAIL_LIVE == 'true'. Until the operator sets that variable (and the RESEND_API_KEY /
# CLAUDE_NOTIFY_EMAIL secrets), every run is --dry-run (logs the summary, sends nothing) — so
# merging this workflow cannot email anyone unconfigured. The workflow_dispatch dry_run input
# forces a dry-run even when ADAM_EMAIL_LIVE is set (for safe manual testing).

on:
  schedule:
    # Chairman-chosen cadence is HOURLY (2026-06-10) and the chairman explicitly asked for it to run
    # at the TOP OF THE HOUR. But GitHub Actions routinely DELAYS and silently DROPS scheduled runs
    # (and drops the :00 slot most often), so a literal `0 * * * *` is unreliable. We therefore ANCHOR
    # the over-schedule grid at :00 (`0,15,30,45`) — it ATTEMPTS the true top of the hour first, with
    # :15/:30/:45 + the once-per-~55-min send guard (scripts/exec-email-should-send.mjs, audit_log
    # marker) as reliability catch-up. GitHub can drop 2-3 of every 4 sub-hourly triggers and the
    # chairman still gets exactly ONE email per ~hour, no duplicates, as close to the top of the hour
    # as GitHub allows. The vision:gauge historize AND the send BOTH gate on the guard, so the trend
    # is historized once per hour (not 4x). SD-LEO-INFRA-FIX-CHAIRMAN-HOURLY-001 (FR-1); top-of-hour
    # anchor per chairman request 2026-06-16 (QF-20260616-776).
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Force dry-run (no send) even if ADAM_EMAIL_LIVE is set"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  # SD-LEO-INFRA-FIX-CHAIRMAN-HOURLY-001 (FR-1): MUST be false. With over-scheduling (~every 15 min)
  # a true setting would let the next trigger CANCEL a run mid-send — between the Resend success and
  # the audit_log marker insert — so the marker is never written and the following run re-sends a
  # DUPLICATE. false serializes runs (one runs, the next queues), guaranteeing the marker is recorded
  # before the next run's guard reads it. Runs are short (~2-3 min) so no meaningful pileup.
  cancel-in-progress: false

jobs:
  exec-email:
    name: Send chairman exec email
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      CLAUDE_NOTIFY_EMAIL: ${{ secrets.CLAUDE_NOTIFY_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # SD-LEO-INFRA-FIX-CHAIRMAN-HOURLY-001 (FR-1): the once-per-hour gate. Because we over-schedule
      # (~every 15 min) to beat GitHub Actions dropping runs, this step decides ONCE whether this
      # trigger should proceed (LIVE: send only if >~55 min since the last send marker; dry-run:
      # always proceed). Both the historize and send steps gate on `should_send`, so the email lands
      # once/hour with no duplicates and the trend historizes once/hour (not 4x).
      - name: Once-per-hour gate
        id: guard
        env:
          ADAM_EMAIL_LIVE: ${{ vars.ADAM_EMAIL_LIVE }}
          FORCE_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: node scripts/exec-email-should-send.mjs

      # SD-LEO-INFRA-VISION-GAUGE-HISTORIZE-001 (FR-2): historize the vision gauge on the SAME hourly
      # cadence as this email, so each sending run appends one auditable snapshot to vision_build_gauge
      # and the send step renders a trend that includes the fresh point. Gated by the once-per-hour
      # guard so over-scheduling does not append 4 snapshots/hour (which would shrink the 24-row trend
      # window). continue-on-error so a writer failure can NEVER block the chairman email; the writer
      # is itself fail-soft (a doc-unavailable run is recorded as available=false, never a missing row).
      - name: Historize the vision gauge (append one snapshot)
        if: steps.guard.outputs.should_send == 'true'
        continue-on-error: true
        run: npm run vision:gauge

      - name: Send chairman exec email (observe-only until ADAM_EMAIL_LIVE repo var = true)
        if: steps.guard.outputs.should_send == 'true'
        run: |
          ARGS="--dry-run"
          if [ "${{ vars.ADAM_EMAIL_LIVE }}" = "true" ] && [ "${{ github.event.inputs.dry_run }}" != "true" ]; then
            ARGS=""
          fi
          echo "Running adam:exec:email:cron ${ARGS:-(LIVE send)}"
          npm run adam:exec:email:cron -- $ARGS
