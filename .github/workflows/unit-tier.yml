# Unit tier — keep main green (SD-LEO-FIX-GREEN-MAIN-TRIAGE-001).
# Runs the canonical no-DB unit project with the quarantine manifest applied
# (tests/quarantine-manifest.json — the tracked debt register). A red run here
# means a NEW regression, not pre-existing debt: fix it, never grow the manifest
# without a reason_class + linked_ref.
name: Unit Tier

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tier:
    name: Run Unit Tier (quarantine-aware)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify node_modules health (@supabase probe)
        # SD-LEO-INFRA-CI-UNIT-TIER-INSTALL-CASCADE-001: exit 2 (INFRA_ERROR) if the
        # install is broken so a cascade of fake test failures is never mistaken for
        # real regressions. Exit 2 distinguishes infra failure from test failure (exit 1).
        run: |
          node -e "require.resolve('@supabase/supabase-js')" 2>/dev/null || {
            echo "[UNIT_TIER_INFRA_ERROR] node_modules broken: @supabase/supabase-js not resolvable. Re-run the job or run npm ci locally."; exit 2; }

      - name: Run unit project (manifest exclusions applied)
        run: npx vitest run --project unit

      - name: Run session-tick node:test suite (SD-LEO-INFRA-FIX-WINDOWS-SESSION-001)
        # These files use node:test/node:assert directly (not vitest globals) and were
        # never wired into any CI step before this SD — vitest's --project unit does not
        # execute node:test-registered tests from an imported module, so they were
        # silently never gating PRs despite existing since QF-20260509-187. Includes the
        # new spawn-and-observe suite that proves the steady-state/PID-rediscovery/
        # first-tick fixes under a real spawned child process.
        run: npm run test:session-tick

      - name: Quarantine burn-down summary
        if: always()
        # SD-LEO-FIX-UNIT-TIER-STARTUP-001: block scalar (run: |) so the embedded
        # "Quarantined files: " colon-space is literal text, not a YAML mapping
        # separator. A plain scalar here caused a top-level parse failure (34:276)
        # -> startup_failure on every run since #4619. Command is byte-identical.
        run: |
          node scripts/unit-tier-quarantine.mjs report .claude-unit-run.log 2>/dev/null || node -e "const m=require('./tests/quarantine-manifest.json'); const by={}; for(const e of m.quarantined) by[e.reason_class]=(by[e.reason_class]||0)+1; console.log('Quarantined files: '+m.quarantined.length); console.log(JSON.stringify(by,null,1));"
